# PI-DimRe4RFs-FieldReducer-v2 Default Configuration

# -----------------------------------------------------------
# Spatial discretization (shared by all fields)
# -----------------------------------------------------------
grid:
  n_nodes_x: 20        # number of nodes in x direction
  n_nodes_z: 10        # number of nodes in z direction
  lx: 1.0              # domain length in x
  lz: 0.5              # domain length in z

# -----------------------------------------------------------
# Random field definitions — all use fixed 2D DCT-II basis
# -----------------------------------------------------------
# All three fields share the same parameter structure.
# Dimensionality is controlled by n_terms:
#   n_terms = 0  →  homogeneous scalar field (single parameter)
#   n_terms > 0  →  spatial random field with n_terms DCT modes
#
# Unified parameter names (preferred):
#   mean           — reference / mean physical value
#   range          — [min, max] physical range for denormalisation
#   fluctuation_std — amplitude of fluctuations (log-space for E,
#                    scaled log-space for k fields)
random_fields:
  E:
    n_terms: 5                    # 0 = homogeneous scalar, d > 0 = d-dim field
    basis: "dct"                  # always DCT; kept for documentation
    seed: 42
    covariance: "matern"
    nu_sampling: true             # sample nu per realisation
    nu_range: [0.5, 2.5]
    nu_ref: 1.5                   # reference nu (used when nu_sampling=false)
    length_scale_sampling: true
    length_scale_range: [0.1, 0.5]
    length_scale_ref: 0.3
    mean: 10.0e6                  # reference Young's modulus [Pa]
    range: [5.0e6, 20.0e6]        # physical range [min, max] [Pa]
    fluctuation_std: 1.0          # std of log(E/mean)
    force_identity_reduction: false

  k_h:
    n_terms: 0                    # homogeneous: single scalar
    basis: "dct"
    seed: 43
    covariance: "matern"
    nu_sampling: false
    nu_ref: 1.5
    length_scale_sampling: false
    length_scale_ref: 0.3
    mean: 1.0e-12                 # reference permeability [m²]
    range: [1.0e-13, 1.0e-10]    # [min, max] permeability [m²]
    fluctuation_std: 0.5          # amplitude of log-space fluctuations
    force_identity_reduction: false

  k_v:
    n_terms: 2                    # 2-dimensional random field
    basis: "dct"
    seed: 44
    covariance: "matern"
    nu_sampling: true
    nu_range: [0.5, 2.5]
    nu_ref: 1.5
    length_scale_sampling: true
    length_scale_range: [0.1, 0.5]
    length_scale_ref: 0.3
    mean: 1.0e-12                 # reference permeability [m²]
    range: [1.0e-13, 1.0e-10]    # [min, max] permeability [m²]
    fluctuation_std: 0.5
    force_identity_reduction: false

# -----------------------------------------------------------
# Biot solver settings
# -----------------------------------------------------------
solver:
  type: "1d"              # "1d" or "2d"
  mode: "steady"          # "steady" or "transient"
  nu_biot: 0.3            # Poisson's ratio
  fluid_viscosity: 1.0e-3 # [Pa·s]
  fluid_compressibility: 4.5e-10  # [1/Pa]
  load: 1.0e4             # applied surface load [Pa]
  transient:
    dt: 0.01
    n_steps: 100

# -----------------------------------------------------------
# Phase 1: dataset generation
# -----------------------------------------------------------
phase1:
  n_samples: 200
  val_fraction: 0.2
  output_dir: "data"

# -----------------------------------------------------------
# Phase 2: Surrogate model in REDUCED parameter space
# -----------------------------------------------------------
# Maps reduced parameters → settlement.
# Trained independently with hybrid physics regularization.
# The surrogate is saved with a dimension-stamped filename:
#   surrogate_{type}_dim{d_total}.pt   (NN)
#   surrogate_{type}_dim{d_total}.pkl  (PCE)
# where d_total = sum(max(n_terms, 1) for each reduced field).
phase2:
  surrogate_type: "nn"        # "nn" or "pce"
  output_repr: "direct"       # "direct" | "dct" | "poly" | "bspline"
  n_output_modes: 10          # used for dct/poly/bspline representations
  n_training_samples: 200     # independent from phase3; samples in REDUCED space
  training_signal: "hybrid"   # "data" | "physics" | "hybrid"
  hybrid_alpha: 0.1           # weight of physics regularization (hybrid mode)
  physics_check_interval: 10  # run Biot check every N epochs (hybrid/physics)
  output_dir: "models/phase2_surrogate"

  # Reduced parameter space: configurable dimensions per field.
  # n_terms: 0 = scalar (homogeneous), >0 = spatial DCT field.
  reduced_fields:
    E:
      n_terms: 3
      basis: "dct"
      seed: 142
      covariance: "matern"
      nu_sampling: false
      nu_ref: 1.5
      length_scale_sampling: false
      length_scale_ref: 0.3
      mean: 10.0e6
      range: [5.0e6, 20.0e6]
      fluctuation_std: 1.0
    k_h:
      n_terms: 2
      basis: "dct"
      seed: 143
      covariance: "matern"
      nu_sampling: false
      nu_ref: 1.5
      length_scale_sampling: false
      length_scale_ref: 0.3
      mean: 1.0e-12
      range: [1.0e-13, 1.0e-10]
      fluctuation_std: 0.5
    k_v:
      n_terms: 0              # scalar (homogeneous)
      basis: "dct"
      seed: 144
      covariance: "matern"
      nu_sampling: false
      nu_ref: 1.5
      length_scale_sampling: false
      length_scale_ref: 0.3
      mean: 1.0e-12
      range: [1.0e-13, 1.0e-10]
      fluctuation_std: 0.5

  nn:
    hidden_dims: [128, 128, 64]
    epochs: 200
    lr: 1.0e-3
    batch_size: 32
    patience: 50             # early stopping patience

  pce:
    degree: 3

  evaluation:
    test_fraction: 0.2       # fraction of data used for evaluation
    n_plot_samples: 5        # number of samples shown in comparison plots

# -----------------------------------------------------------
# Phase 3: Dimension reducer from FULL to REDUCED parameter space
# -----------------------------------------------------------
# Maps full-dimensional parameters → reduced-dimensional parameters.
# Trained with surrogate or physics loss, ALWAYS evaluated with Biot.
phase3:
  reducer_type: "nn"          # "nn"
  training_signal: "surrogate"  # "surrogate" | "physics"
  n_training_samples: 500     # independent from phase2; samples in FULL space
  output_dir: "models/phase3_reducer"
  surrogate_dir: "models/phase2_surrogate"   # Phase-2 model directory to search
  load_phase2_model: null     # Path to specific Phase-2 model file, or null to auto-detect

  # Full parameter space (input to reducer).
  full_fields:
    E:
      n_terms: 5
      basis: "dct"
      seed: 42
      covariance: "matern"
      nu_sampling: true
      nu_range: [0.5, 2.5]
      nu_ref: 1.5
      length_scale_sampling: true
      length_scale_range: [0.1, 0.5]
      length_scale_ref: 0.3
      mean: 10.0e6
      range: [5.0e6, 20.0e6]
      fluctuation_std: 1.0
    k_h:
      n_terms: 0
      basis: "dct"
      seed: 43
      covariance: "matern"
      nu_sampling: false
      nu_ref: 1.5
      length_scale_sampling: false
      length_scale_ref: 0.3
      mean: 1.0e-12
      range: [1.0e-13, 1.0e-10]
      fluctuation_std: 0.5
    k_v:
      n_terms: 2
      basis: "dct"
      seed: 44
      covariance: "matern"
      nu_sampling: true
      nu_range: [0.5, 2.5]
      nu_ref: 1.5
      length_scale_sampling: true
      length_scale_range: [0.1, 0.5]
      length_scale_ref: 0.3
      mean: 1.0e-12
      range: [1.0e-13, 1.0e-10]
      fluctuation_std: 0.5

  # Reduced parameter space (output of reducer; MUST match phase2.reduced_fields).
  reduced_fields:
    E:
      n_terms: 3
      basis: "dct"
      seed: 142
      covariance: "matern"
      nu_sampling: false
      nu_ref: 1.5
      length_scale_sampling: false
      length_scale_ref: 0.3
      mean: 10.0e6
      range: [5.0e6, 20.0e6]
      fluctuation_std: 1.0
    k_h:
      n_terms: 2
      basis: "dct"
      seed: 143
      covariance: "matern"
      nu_sampling: false
      nu_ref: 1.5
      length_scale_sampling: false
      length_scale_ref: 0.3
      mean: 1.0e-12
      range: [1.0e-13, 1.0e-10]
      fluctuation_std: 0.5
    k_v:
      n_terms: 0
      basis: "dct"
      seed: 144
      covariance: "matern"
      nu_sampling: false
      nu_ref: 1.5
      length_scale_sampling: false
      length_scale_ref: 0.3
      mean: 1.0e-12
      range: [1.0e-13, 1.0e-10]
      fluctuation_std: 0.5

  nn:
    hidden_dims: [256, 128, 64]
    epochs: 300
    lr: 1.0e-3
    batch_size: 32
    patience: 50

  evaluation:
    test_fraction: 0.2       # fraction of data used for evaluation
    n_plot_samples: 5        # number of samples shown in comparison plots

# -----------------------------------------------------------
# Phase 4: validation
# -----------------------------------------------------------
phase4:
  n_test_samples: 50
  output_dir: "results"
  use_physics_for_plots: false   # bypass surrogate for ground-truth plots
