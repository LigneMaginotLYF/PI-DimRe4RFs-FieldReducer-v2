# PI-DimRe4RFs-FieldReducer-v2 Configuration
#
# Two-model workflow:
#   Model A (surrogate) : reduced params → settlement
#   Model B (reducer)   : full params    → reduced params
#
# Config organisation:
#   1. Shared spatial / solver settings
#   2. data_generation: dataset-generation configs for BOTH models (first)
#   3. models:          architecture and training configs for BOTH models (second)
#   4. evaluation:      evaluation / plotting settings for BOTH models
#
# Legacy keys (phase2 / phase3 / collocation_phase2 / collocation_phase3) are
# still accepted for backward compatibility; new keys take precedence.
# Use the canonical paths shown here for new configs.
#
# ─── MIGRATION NOTE ────────────────────────────────────────────────────────────
# collocation_phase2 / collocation_phase3 → data_generation.surrogate/reducer.collocation_n_points
# phase2.*           → models.surrogate.* and/or data_generation.surrogate.*
# phase3.*           → models.reducer.*  and/or data_generation.reducer.*
# ───────────────────────────────────────────────────────────────────────────────

# -----------------------------------------------------------
# Spatial discretization (shared by all fields)
# -----------------------------------------------------------
grid:
  n_nodes_x: 20        # number of nodes in x direction
  n_nodes_z: 10        # number of nodes in z direction
  lx: 1.0              # domain length in x [m]
  lz: 0.5              # domain length in z [m]

# -----------------------------------------------------------
# Random field definitions for Phase-1 data generation
# (full-space fields; used by Phase 1 and as basis for Phase 3)
# -----------------------------------------------------------
random_fields:
  E:
    n_terms: 5
    basis: "dct"
    seed: 42
    covariance: "matern"
    nu_sampling: true
    nu_range: [0.5, 2.5]
    nu_ref: 1.5
    length_scale_sampling: true
    length_scale_range: [0.1, 0.5]
    length_scale_ref: 0.3
    mean: 10.0e6
    range: [5.0e6, 20.0e6]
    fluctuation_std: 1.0
    force_identity_reduction: false
    mean_sampling: true
    mean_range: [5.0e6, 20.0e6]
  k_h:
    n_terms: 0
    basis: "dct"
    seed: 43
    covariance: "matern"
    nu_sampling: false
    nu_ref: 1.5
    length_scale_sampling: false
    length_scale_ref: 0.3
    mean: 1.0e-12
    range: [1.0e-13, 1.0e-10]
    fluctuation_std: 0.5
    force_identity_reduction: false
    mean_sampling: true
    mean_range: [1.0e-13, 1.0e-10]
  k_v:
    n_terms: 2
    basis: "dct"
    seed: 44
    covariance: "matern"
    nu_sampling: true
    nu_range: [0.5, 2.5]
    nu_ref: 1.5
    length_scale_sampling: true
    length_scale_range: [0.1, 0.5]
    length_scale_ref: 0.3
    mean: 1.0e-12
    range: [1.0e-13, 1.0e-10]
    fluctuation_std: 0.5
    force_identity_reduction: false
    mean_sampling: true
    mean_range: [1.0e-13, 1.0e-10]

# -----------------------------------------------------------
# Biot solver settings
# -----------------------------------------------------------
solver:
  type: "1d"              # "1d" or "2d"
  mode: "steady"          # "steady" or "transient"
  nu_biot: 0.3
  fluid_viscosity: 1.0e-3
  fluid_compressibility: 4.5e-10
  load: 1.0e4
  # transient settings are only used when mode="transient"
  transient:
    dt: 0.01
    n_steps: 100

# -----------------------------------------------------------
# Phase 1: full-space dataset generation (legacy path)
# -----------------------------------------------------------
phase1:
  n_samples: 200
  val_fraction: 0.2
  output_dir: "data"

# ===========================================================
# DATA GENERATION  (both models — placed first per convention)
# ===========================================================

data_generation:

  # ---- Surrogate training data (reduced-space) ----
  surrogate:
    n_samples: 200               # independent from reducer dataset
    output_dir: "data/phase2"
    collocation_n_points: 20     # collocation points (canonical, replaces collocation_phase2)
    # Reduced-space field configs — define sampling AND model input dimension.
    # mean_sampling=true enables per-sample mean diversity in training data.
    fields:
      E:
        n_terms: 3
        basis: "dct"
        seed: 142
        covariance: "matern"
        nu_sampling: false
        nu_ref: 1.5
        length_scale_sampling: false
        length_scale_ref: 0.3
        mean: 10.0e6
        range: [5.0e6, 20.0e6]
        fluctuation_std: 1.0
        mean_sampling: true       # sample mean from mean_range per training sample
        mean_range: [5.0e6, 20.0e6]
      k_h:
        n_terms: 2
        basis: "dct"
        seed: 143
        covariance: "matern"
        nu_sampling: false
        nu_ref: 1.5
        length_scale_sampling: false
        length_scale_ref: 0.3
        mean: 1.0e-12
        range: [1.0e-13, 1.0e-10]
        fluctuation_std: 0.5
        mean_sampling: true
        mean_range: [1.0e-13, 1.0e-10]
      k_v:
        n_terms: 0              # scalar
        basis: "dct"
        seed: 144
        covariance: "matern"
        nu_sampling: false
        nu_ref: 1.5
        length_scale_sampling: false
        length_scale_ref: 0.3
        mean: 1.0e-12
        range: [1.0e-13, 1.0e-10]
        fluctuation_std: 0.5
        mean_sampling: true
        mean_range: [1.0e-13, 1.0e-10]

  # ---- Reducer training data (full-space) ----
  reducer:
    n_samples: 500               # independent from surrogate dataset
    output_dir: "data/phase3"
    collocation_n_points: 5      # canonical, replaces collocation_phase3
    # Full-space field configs for generating reducer training inputs.
    fields:
      E:
        n_terms: 5
        basis: "dct"
        seed: 42
        covariance: "matern"
        nu_sampling: true
        nu_range: [0.5, 2.5]
        nu_ref: 1.5
        length_scale_sampling: true
        length_scale_range: [0.1, 0.5]
        length_scale_ref: 0.3
        mean: 10.0e6
        range: [5.0e6, 20.0e6]
        fluctuation_std: 1.0
        mean_sampling: true
        mean_range: [5.0e6, 20.0e6]
      k_h:
        n_terms: 0
        basis: "dct"
        seed: 43
        covariance: "matern"
        nu_sampling: false
        nu_ref: 1.5
        length_scale_sampling: false
        length_scale_ref: 0.3
        mean: 1.0e-12
        range: [1.0e-13, 1.0e-10]
        fluctuation_std: 0.5
        mean_sampling: true
        mean_range: [1.0e-13, 1.0e-10]
      k_v:
        n_terms: 2
        basis: "dct"
        seed: 44
        covariance: "matern"
        nu_sampling: true
        nu_range: [0.5, 2.5]
        nu_ref: 1.5
        length_scale_sampling: true
        length_scale_range: [0.1, 0.5]
        length_scale_ref: 0.3
        mean: 1.0e-12
        range: [1.0e-13, 1.0e-10]
        fluctuation_std: 0.5
        mean_sampling: true
        mean_range: [1.0e-13, 1.0e-10]

# ===========================================================
# MODELS  (both models — placed after data generation)
# ===========================================================

models:

  # ---- Surrogate model: reduced params → settlement ----
  surrogate:
    type: "nn"               # "nn" or "pce"
    output_repr: "direct"    # "direct" | "dct" | "poly" | "bspline"
    n_output_modes: 10
    training_signal: "hybrid"   # "data" | "physics" | "hybrid"
    hybrid_alpha: 0.1
    physics_check_interval: 10
    output_dir: "models/phase2_surrogate"
    # Reduced-space dimensionality config (must match data_generation.surrogate.fields n_terms).
    # This section defines the model's input dimension; for mean_sampling in data
    # generation use data_generation.surrogate.fields instead.
    reduced_fields:
      E:
        n_terms: 3
        basis: "dct"
        seed: 142
        covariance: "matern"
        nu_sampling: false
        nu_ref: 1.5
        length_scale_sampling: false
        length_scale_ref: 0.3
        mean: 10.0e6
        range: [5.0e6, 20.0e6]
        fluctuation_std: 1.0
        mean_sampling: true
        mean_range: [5.0e6, 20.0e6]
      k_h:
        n_terms: 2
        basis: "dct"
        seed: 143
        covariance: "matern"
        nu_sampling: false
        nu_ref: 1.5
        length_scale_sampling: false
        length_scale_ref: 0.3
        mean: 1.0e-12
        range: [1.0e-13, 1.0e-10]
        fluctuation_std: 0.5
        mean_sampling: true
        mean_range: [1.0e-13, 1.0e-10]
      k_v:
        n_terms: 0
        basis: "dct"
        seed: 144
        covariance: "matern"
        nu_sampling: false
        nu_ref: 1.5
        length_scale_sampling: false
        length_scale_ref: 0.3
        mean: 1.0e-12
        range: [1.0e-13, 1.0e-10]
        fluctuation_std: 0.5
        mean_sampling: true
        mean_range: [1.0e-13, 1.0e-10]
    nn:
      hidden_dims: [128, 128, 64]
      epochs: 200
      lr: 1.0e-3
      batch_size: 32
      patience: 50
    pce:
      degree: 3

  # ---- Reducer model: full params → reduced params ----
  reducer:
    type: "nn"
    training_signal: "surrogate"   # "surrogate" | "physics"
    output_dir: "models/phase3_reducer"
    surrogate_dir: "models/phase2_surrogate"
    load_phase2_model: null        # path to specific .pt file, or null to auto-detect
    # reduced_fields is inherited from models.surrogate.reduced_fields if not set here.
    # Uncomment and edit only if phase3 reduced space differs from phase2 surrogate:
    # reduced_fields: { E: {...}, k_h: {...}, k_v: {...} }
    nn:
      hidden_dims: [256, 128, 64]
      epochs: 300
      lr: 1.0e-3
      batch_size: 32
      patience: 50

# ===========================================================
# EVALUATION  (both models — placed after model configs)
# ===========================================================

evaluation:
  surrogate:
    test_fraction: 0.2
    n_plot_samples: 5
  reducer:
    test_fraction: 0.2
    n_plot_samples: 5

# -----------------------------------------------------------
# Phase 4: end-to-end validation (legacy path, rarely used)
# -----------------------------------------------------------
phase4:
  n_test_samples: 50
  output_dir: "results"
  use_physics_for_plots: false
