# PI-DimRe4RFs-FieldReducer-v2 Configuration
#
# Two-model workflow:
#   Model A (surrogate) : reduced params → settlement
#   Model B (reducer)   : full params    → reduced params
#
# Config organisation (canonical — single source of truth per model):
#   a) Grid + solver settings
#   b) model_a — field definitions (dimension + sampling), dataset generation
#      counts, model hyperparams, and plotting control for Model A (surrogate)
#   c) model_b — field definitions (full-space), dataset generation counts,
#      model hyperparams, and plotting control for Model B (reducer)
#
# Key design rule
# ---------------
# model_a.fields  →  controls BOTH dataset generation AND the surrogate model's
#                    input dimension.  No separate 'reduced_fields' block exists.
# model_b.fields  →  full-space fields used for reducer dataset generation only.
#                    The reducer OUTPUT dimension (reduced space) is ALWAYS derived
#                    from model_a.fields — do NOT duplicate it in model_b.
#
# ─── MIGRATION NOTE ────────────────────────────────────────────────────────────
# data_generation.surrogate / models.surrogate → model_a
# data_generation.reducer   / models.reducer   → model_b
# phase2.*                                     → model_a.*
# phase3.*                                     → model_b.*
# Legacy keys (phase2 / phase3 / data_generation / models) are still accepted
# for backward compatibility but are translated internally.
# ───────────────────────────────────────────────────────────────────────────────

# -----------------------------------------------------------
# (a) Spatial discretization and Biot solver settings
# -----------------------------------------------------------
grid:
  n_nodes_x: 20        # number of nodes in x direction
  n_nodes_z: 10        # number of nodes in z direction
  lx: 1.0              # domain length in x [m]
  lz: 0.5              # domain length in z [m]

solver:
  type: "2d"              # "1d" or "2d"
  mode: "steady"          # "steady" or "transient"
  nu_biot: 0.3
  fluid_viscosity: 1.0e-3
  fluid_compressibility: 4.5e-10
  load: 1.0e6
  # transient settings are only used when mode="transient"
  transient:
    dt: 0.01
    n_steps: 100

# -----------------------------------------------------------
# Phase 1: full-space dataset generation (legacy path)
# -----------------------------------------------------------
phase1:
  n_samples: 2000
  val_fraction: 0.2
  output_dir: "data"

# -----------------------------------------------------------
# Random field definitions for Phase-1 data generation
# (full-space fields; used only by Phase 1)
# -----------------------------------------------------------
random_fields:
  E:
    n_terms: 15
    basis: "dct"
    seed: 42
    covariance: "matern"
    nu_sampling: true
    nu_range: [0.5, 2.5]
    nu_ref: 1.5
    length_scale_sampling: true
    length_scale_range: [0.1, 0.5]
    length_scale_ref: 0.3
    mean: 10.0e6
    range: [5.0e6, 20.0e6]
    fluctuation_std: 1.0
    force_identity_reduction: false
    mean_sampling: true
    mean_range: [5.0e6, 20.0e6]
  k_h:
    n_terms: 0
    basis: "dct"
    seed: 43
    covariance: "matern"
    nu_sampling: false
    nu_ref: 1.5
    length_scale_sampling: false
    length_scale_ref: 0.3
    mean: 1.0e-12
    range: [1.0e-13, 1.0e-10]
    fluctuation_std: 0.5
    force_identity_reduction: false
    mean_sampling: true
    mean_range: [1.0e-13, 1.0e-10]
  k_v:
    n_terms: 0
    basis: "dct"
    seed: 44
    covariance: "matern"
    nu_sampling: true
    nu_range: [0.5, 2.5]
    nu_ref: 1.5
    length_scale_sampling: true
    length_scale_range: [0.1, 0.5]
    length_scale_ref: 0.3
    mean: 1.0e-12
    range: [1.0e-13, 1.0e-10]
    fluctuation_std: 0.5
    force_identity_reduction: false
    mean_sampling: true
    mean_range: [1.0e-13, 1.0e-10]

# ===========================================================
# (b) Model A — Surrogate (reduced params → settlement)
#     Single canonical field config: controls BOTH dataset
#     generation AND the surrogate model's input dimension.
# ===========================================================
model_a:

  # ── Field definitions (SINGLE SOURCE OF TRUTH) ─────────────────────────────
  # These settings define the reduced parameter space.
  # They are used for:
  #   1. Sampling training data (n_terms controls the coefficient-space dimension)
  #   2. Defining the surrogate model's input dimension
  #   3. Defining the reducer model's OUTPUT dimension (inherited automatically)
  # mean_sampling=true enables per-sample mean diversity in training data.
  fields:
    E:
      n_terms: 8
      basis: "dct"
      seed: 142
      covariance: "matern"
      nu_sampling: false
      nu_ref: 1.5
      length_scale_sampling: false
      length_scale_ref: 0.3
      mean: 10.0e6
      range: [5.0e6, 20.0e6]
      fluctuation_std: 1.0
      mean_sampling: true
      mean_range: [5.0e6, 20.0e6]
    k_h:
      n_terms: 0
      basis: "dct"
      seed: 143
      covariance: "matern"
      nu_sampling: false
      nu_ref: 1.5
      length_scale_sampling: false
      length_scale_ref: 0.3
      mean: 1.0e-12
      range: [1.0e-13, 1.0e-10]
      fluctuation_std: 0.5
      mean_sampling: true
      mean_range: [1.0e-13, 1.0e-10]
    k_v:
      n_terms: 0
      basis: "dct"
      seed: 144
      covariance: "matern"
      nu_sampling: false
      nu_ref: 1.5
      length_scale_sampling: false
      length_scale_ref: 0.3
      mean: 1.0e-12
      range: [1.0e-13, 1.0e-10]
      fluctuation_std: 0.5
      mean_sampling: true
      mean_range: [1.0e-13, 1.0e-10]

  # ── Dataset generation ──────────────────────────────────────────────────────
  n_samples: 2000
  output_dir: "models/phase2_surrogate"
  collocation_n_points: 20

  # ── Model hyperparams ───────────────────────────────────────────────────────
  type: "nn"               # "nn" or "pce"
  output_repr: "direct"    # "direct" | "dct" | "poly" | "bspline"
  n_output_modes: 10
  training_signal: "hybrid"   # "data" | "physics" | "hybrid"
  hybrid_alpha: 0.1
  physics_check_interval: 10
  nn:
    hidden_dims: [128, 128, 64]
    epochs: 200
    lr: 1.0e-3
    batch_size: 32
    patience: 50
  pce:
    degree: 3

  # ── Evaluation / plotting ───────────────────────────────────────────────────
  evaluation:
    test_fraction: 0.1
    n_plot_samples: 10

# ===========================================================
# (c) Model B — Reducer (full params → reduced params)
#     The reduced OUTPUT dimension is inherited automatically
#     from model_a.fields — do NOT duplicate it here.
# ===========================================================
model_b:

  # ── Full-space field definitions ────────────────────────────────────────────
  # These control the reducer's INPUT space (full-dimensional fields).
  # The reducer OUTPUT dimension is always equal to model_a.fields dimensions.
  fields:
    E:
      n_terms: 15
      basis: "dct"
      seed: 42
      covariance: "matern"
      nu_sampling: true
      nu_range: [0.5, 2.5]
      nu_ref: 1.5
      length_scale_sampling: true
      length_scale_range: [0.1, 0.5]
      length_scale_ref: 0.3
      mean: 10.0e6
      range: [5.0e6, 20.0e6]
      fluctuation_std: 1.0
      mean_sampling: true
      mean_range: [5.0e6, 20.0e6]
    k_h:
      n_terms: 0
      basis: "dct"
      seed: 43
      covariance: "matern"
      nu_sampling: false
      nu_ref: 1.5
      length_scale_sampling: false
      length_scale_ref: 0.3
      mean: 1.0e-12
      range: [1.0e-13, 1.0e-10]
      fluctuation_std: 0.5
      mean_sampling: true
      mean_range: [1.0e-13, 1.0e-10]
    k_v:
      n_terms: 0
      basis: "dct"
      seed: 44
      covariance: "matern"
      nu_sampling: true
      nu_range: [0.5, 2.5]
      nu_ref: 1.5
      length_scale_sampling: true
      length_scale_range: [0.1, 0.5]
      length_scale_ref: 0.3
      mean: 1.0e-12
      range: [1.0e-13, 1.0e-10]
      fluctuation_std: 0.5
      mean_sampling: true
      mean_range: [1.0e-13, 1.0e-10]

  # ── Dataset generation ──────────────────────────────────────────────────────
  n_samples: 5000
  output_dir: "models/phase3_reducer"
  collocation_n_points: 20
  surrogate_dir: "models/phase2_surrogate"
  load_phase2_model: null        # path to specific .pt file, or null to auto-detect

  # ── Model hyperparams ───────────────────────────────────────────────────────
  type: "nn"
  training_signal: "surrogate"   # "surrogate" | "physics"
  nn:
    hidden_dims: [256, 128, 64]
    epochs: 300
    lr: 1.0e-3
    batch_size: 32
    patience: 50

  # ── Evaluation / plotting ───────────────────────────────────────────────────
  evaluation:
    test_fraction: 0.1
    n_plot_samples: 10
    # plot_mode controls the settlement comparison figure:
    #   "two_curve"   → GT + reducer→Biot  (always available)
    #   "three_curve" → GT + reducer→Biot + reducer→Surrogate  (requires trained Phase 2)
    plot_mode: "three_curve"

# ===========================================================
# Phase 4: end-to-end validation
# ===========================================================
phase4:
  n_test_samples: 50
  output_dir: "results"
  use_physics_for_plots: true
  # Seed control: set random_seed to an integer for reproducible sampling,
  # or change it to get a different set of test samples.
  # shuffle: true means sample order is randomised (consistent with seed).
  random_seed: 0
  shuffle: true
